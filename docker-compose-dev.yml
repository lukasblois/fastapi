services:
    api:
        build: .
        depends_on:
            - postgres
        restart: on-failure
        ports:
            - 8000:8000
        volumes:
            - ./:/usr/src/app:ro
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        environment:
            - DATABASE_HOSTNAME=postgres
            - DATABASE_PORT=5432
            - DATABASE_PASSWORD=#pi3.1415
            - DATABASE_NAME=fastapi
            - DATABASE_USERNAME=postgres
            - SECRET_KEY=O0xgalEUTGvDNgoArVxndbzexqpCR2mQ
            - ALGORITHM=HS256
            - ACCESS_TOKEN_EXPIRE_MINUTES=30

    postgres:
        image: postgres
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_PASSWORD=password123
            - POSTGRES_DB=fastapi

        volumes:
            - postgres-db:/var/lib/postgresql

volumes:
    postgres-db:
