name: Build and Deploy Code

on: [push, pull_request]

jobs:
  build:
    environment:
      name: testing
    env:
      database_hostname: ${{secrets.DATABASE_HOSTNAME}}
      database_port: ${{secrets.DATABASE_PORT}}
      database_password: ${{secrets.DATABASE_PASSWORD}}
      database_name: ${{secrets.DATABASE_NAME}}
      database_username: ${{secrets.DATABASE_USERNAME}}
      secret_key: ${{secrets.SECRET_KEY}}
      algorithm: ${{secrets.ALGORITHM}}
      access_token_expire_minutes: ${{secrets.ACCESS_TOKEN_EXPIRE_MINUTES}}
      limit_global: ${{secrets.LIMIT_GLOBAL}}
      limit_users_create: ${{secrets.LIMIT_USERS_CREATE}}
      limit_posts_create: ${{secrets.LIMIT_POSTS_CREATE}}
      limit_posts_delete: ${{secrets.LIMIT_POSTS_DELETE}}
      limit_vote: ${{secrets.LIMIT_VOTE}}
      limit_password_reset: ${{secrets.LIMIT_PASSWORD_RESET}}
      REDIS_URL: "redis://localhost:6379"

    services: 
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options:
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:17.2
        env:
          POSTGRES_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
          POSTGRES_DB: ${{secrets.DATABASE_NAME}}_test
        ports:
          - 5432:5432
        options:
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    runs-on: ubuntu-latest
    steps:
      - name: pulling git repo
        uses: actions/checkout@v6
      - name: install python version 3.13
        uses: actions/setup-python@v2
        with:
          python-version: "3.13"
      - name: update pip
        run: python -m pip install --upgrade pip
      - name: install all dependencies
        run: pip install -r requirements.txt
      - name: test with pytest
        run: |
          pip install pytest
          pytest
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_HUB_USERNAME }}
      #     password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      # - name: Setup Docker Buildx
      #   id: buildx
      #   uses: docker/setup-buildx-action@v3
      # - name: Build and Push
      #   id: docker-build
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: ./
      #     file: ./Dockerfile
      #     push: true
      #     tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi:latest
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: production
    steps:
      - name: pulling git repo
        uses: actions/checkout@v6
      - name: deploy to render
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.RENDER_SERVICE_ID }}
          api_key: ${{ secrets.RENDER_API_KEY }}